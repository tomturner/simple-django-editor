name: Release (macOS)

# Builds the universal macOS app and attaches the .dmg and .zip to a release.
# Runs automatically when you publish a Release, and can be run manually against
# an existing tag from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build & attach to (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build universal macOS app (.dmg + .zip)
        # --publish never: just build, don't let electron-builder publish (we
        # attach the files ourselves in the next step).
        run: npx electron-builder --mac --universal --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Attach installers to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: gh release upload "$TAG" dist/*.dmg dist/*.zip --clobber
