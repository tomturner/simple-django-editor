name: Release (macOS)

# Builds the universal macOS app and attaches the .dmg and .zip to a release.
# Runs automatically when you publish a Release, and can be run manually against
# an existing tag from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build & attach to (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS apps (.dmg + .zip, per architecture)
        # Per-arch builds (arm64 + x64) — native node-pty can't be merged into a
        # universal binary. --publish never: we attach the files ourselves next.
        # Signs + notarizes when the signing secrets are present; otherwise
        # builds unsigned so releases still work before the secrets are set.
        run: npx electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Only sign (and thus notarize) when a certificate secret is provided.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}

      - name: Attach installers to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: gh release upload "$TAG" dist/*.dmg dist/*.zip --clobber
