<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
    <title>Claude</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #1e1f22; color: #dfe1e5;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 13px; }
      body { display: flex; flex-direction: column; }
      #bar { display: flex; align-items: center; gap: 6px; padding: 6px 8px; background: #2b2d30;
        border-bottom: 1px solid #393b40; flex: 0 0 auto; }
      select, button { background: #26282b; color: #dfe1e5; border: 1px solid #393b40; border-radius: 5px;
        padding: 5px 8px; font-size: 13px; cursor: pointer; outline: none; }
      select { flex: 1 1 auto; }
      button:hover { background: #34363a; }
      #view { flex: 1 1 auto; min-height: 0; position: relative; background: #fff; }
      webview { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
      #empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        color: #9aa0a6; text-align: center; padding: 24px; }
    </style>
  </head>
  <body>
    <div id="bar">
      <select id="pick" title="Which assistant"></select>
      <button id="reload" title="Reload">⟳</button>
      <button id="ext" title="Open in default browser">↗</button>
    </div>
    <div id="view">
      <div id="empty">No assistant URL configured.<br />Set one in the main window: ⚙ Settings → Assistants.</div>
      <webview id="wv" partition="persist:assistants" src="about:blank"></webview>
    </div>
    <script src="assistant.js"></script>
  </body>
</html>
